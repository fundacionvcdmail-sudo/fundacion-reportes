<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fundación | Ingreso Clínico</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --secondary: #a855f7; --card: rgba(30,41,59,0.8); --input-bg: rgba(15,23,42,0.6); --text: #f8fafc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Outfit', sans-serif; background: radial-gradient(circle at top right, #1e1b4b, #0f172a); color: var(--text); margin: 0; padding: 20px 15px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 580px; background: var(--card); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 28px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); margin-bottom: 30px; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 5px; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
        p.subtitle { font-size: 13px; color: #94a3b8; text-align: center; margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 10px; }
        .full-width { grid-column: 1 / -1; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: #818cf8; margin-bottom: 5px; margin-left: 4px; }
        input, textarea, select { width: 100%; background: var(--input-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 11px 13px; color: white; font-family: inherit; font-size: 14px; transition: all 0.3s ease; }
        input[type="file"] { padding: 8px; font-size: 12px; }
        select { appearance: none; cursor: pointer; }
        select option { background: #1e293b; color: white; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
        textarea { height: 80px; resize: none; }
        .section-title { font-size: 13px; color: #c084fc; margin-top: 12px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.06); grid-column: 1 / -1; text-align: center; font-weight: 700; letter-spacing: 0.05em; }
        .alerta-section { margin-top: 18px; margin-bottom: 20px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.05); }
        .alerta-selector { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .alerta-btn { padding: 11px 5px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15,23,42,0.3); color: #94a3b8; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center; }
        .alerta-btn.active[data-val="Normal"] { background: #166534; color: white; border-color: #22c55e; }
        .alerta-btn.active[data-val="Precaución"] { background: #854d0e; color: white; border-color: #eab308; }
        .alerta-btn.active[data-val="Crítico"] { background: #991b1b; color: white; border-color: #ef4444; }
        .submit-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; border-radius: 16px; color: white; font-size: 15px; font-weight: 600; cursor: pointer; box-shadow: 0 10px 15px -3px rgba(99,102,241,0.4); margin-top: 10px; transition: transform 0.2s; }
        .submit-btn:active { transform: scale(0.97); }
        .status { margin-top: 15px; text-align: center; font-size: 13px; padding: 12px; border-radius: 12px; display: none; }
        .status.success { background: rgba(34,197,94,0.2); color: #4ade80; display: block; }
        .status.error { background: rgba(239,68,68,0.2); color: #f87171; display: block; }
        .uppercase-input { text-transform: uppercase; }
        .loading { pointer-events: none; opacity: 0.6; }
        .img-preview { max-width: 100px; border-radius: 10px; margin-top: 6px; display: none; border: 2px solid rgba(99,102,241,0.3); }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        /* Indicador de valor en letras */
        .valor-letras {
            font-size: 11px;
            color: #a78bfa;
            margin-top: 4px;
            margin-left: 4px;
            min-height: 16px;
            font-style: italic;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Ingreso Clínico</h1>
    <p class="subtitle">Complete los campos necesarios para generar la ficha</p>

    <form id="registroForm">
        <div class="form-grid">

            <!-- ========== SECCIÓN 1: DATOS Y MEDIA ========== -->
            <div class="section-title">📋 DATOS Y MEDIA DEL PACIENTE</div>

            <div class="input-group full-width">
                <label>📸 Foto del Paciente</label>
                <input type="file" id="foto_paciente" accept="image/*">
                <img id="preview" class="img-preview" alt="Vista previa">
            </div>
            <div class="input-group full-width">
                <label>Nombre Completo del Paciente</label>
                <input type="text" id="nombre" class="uppercase-input">
            </div>
            <div class="input-group">
                <label>Documento de Identidad</label>
                <input type="number" id="cedula">
            </div>
            <div class="input-group">
                <label>Edad (Años)</label>
                <input type="number" id="edad">
            </div>

            <!-- ========== SECCIÓN 2: INGRESO Y FINANCIEROS ========== -->
            <div class="section-title">💰 DATOS DE INGRESO Y FINANCIEROS</div>

            <div class="input-group">
                <label>Fecha de Ingreso</label>
                <input type="date" id="fecha_ingreso">
            </div>
            <div class="input-group">
                <label>Mes de Pago</label>
                <select id="mes_pago">
                    <option value="">— Seleccionar —</option>
                    <option value="ENERO">Enero</option>
                    <option value="FEBRERO">Febrero</option>
                    <option value="MARZO">Marzo</option>
                    <option value="ABRIL">Abril</option>
                    <option value="MAYO">Mayo</option>
                    <option value="JUNIO">Junio</option>
                    <option value="JULIO">Julio</option>
                    <option value="AGOSTO">Agosto</option>
                    <option value="SEPTIEMBRE">Septiembre</option>
                    <option value="OCTUBRE">Octubre</option>
                    <option value="NOVIEMBRE">Noviembre</option>
                    <option value="DICIEMBRE">Diciembre</option>
                </select>
            </div>
            <div class="input-group full-width">
                <label>Costo Mensual ($)</label>
                <input type="number" id="costo_mensual" placeholder="Ej: 750000" oninput="actualizarLetras()">
                <div class="valor-letras" id="valorEnLetras"></div>
            </div>

            <!-- ========== SECCIÓN 3: ACUDIENTE ========== -->
            <div class="section-title">👥 DATOS DEL ACUDIENTE</div>

            <div class="input-group full-width">
                <label>Nombre del Acudiente</label>
                <input type="text" id="nombre_acudiente" class="uppercase-input">
            </div>
            <div class="input-group">
                <label>Teléfono Acudiente</label>
                <input type="tel" id="telefono_acudiente">
            </div>
            <div class="input-group">
                <label>Parentesco</label>
                <input type="text" id="parentesco" class="uppercase-input">
            </div>

            <!-- ========== SECCIÓN 4: CONTROL CLÍNICO ========== -->
            <div class="section-title">💊 CONTROL CLÍNICO Y TRATAMIENTOS</div>

            <div class="input-group full-width">
                <label>Medicamentos Actuales</label>
                <input type="text" id="medicamentos" class="uppercase-input" placeholder="Ej: QUETIAPINA 25MG, SERTRALINA 50MG">
            </div>
            <div class="input-group">
                <label>🍄 Tomas Psilocibina</label>
                <input type="number" id="psilocibina" value="0">
            </div>
            <div class="input-group">
                <label>💉 Sueros Desintox.</label>
                <input type="number" id="sueros" value="0">
            </div>

            <!-- ========== SECCIÓN 5: CITAS Y TERAPIAS ========== -->
            <div class="section-title">📅 CONTROL DE CITAS Y TERAPIAS</div>

            <div class="input-group">
                <label>🏥 Citas Médicas</label>
                <input type="text" id="citas_medicas" class="uppercase-input">
            </div>
            <div class="input-group">
                <label>🦷 Odontología</label>
                <input type="text" id="citas_odontologia" class="uppercase-input">
            </div>
            <div class="input-group">
                <label>🧠 Psicología</label>
                <input type="text" id="citas_psicologia" class="uppercase-input">
            </div>
            <div class="input-group">
                <label>🤝 Consejería Terapéutica</label>
                <input type="text" id="consejeria" class="uppercase-input">
            </div>
            <div class="input-group">
                <label>🧪 Psiquiatría</label>
                <input type="text" id="citas_psiquiatria" class="uppercase-input">
            </div>
            <div class="input-group">
                <label>👨‍👩‍👧 Terapia en Familia</label>
                <input type="text" id="terapia_familia" class="uppercase-input">
            </div>

            <!-- ========== SECCIÓN 6: SEGUIMIENTO ========== -->
            <div class="input-group full-width" style="margin-top: 12px;">
                <label>📝 Observaciones Adicionales</label>
                <textarea id="observaciones"></textarea>
            </div>
        </div>

        <!-- ALERTA -->
        <div class="alerta-section">
            <label style="text-align:center; margin-bottom:10px; display:block;">🚨 NIVEL DE RIESGO / ALERTA</label>
            <div class="alerta-selector">
                <div class="alerta-btn active" data-val="Normal">NORMAL</div>
                <div class="alerta-btn" data-val="Precaución">PRECAUCIÓN</div>
                <div class="alerta-btn" data-val="Crítico">CRÍTICO</div>
            </div>
        </div>

        <button type="submit" id="sendBtn" class="submit-btn">ENVIAR Y GENERAR FICHA</button>
        <div id="statusMsg" class="status"></div>
    </form>
</div>

<script>
    const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbyfrxAl87JqqiqJIFyWtLRJILssjWlBe-P0V0tRLC_ZcRXHrVGtYd402kO4WhUs0w8iEQ/exec";
    let alertaSeleccionada = "Normal";

    // ═══════════════════════════════════════════
    // CONVERSOR DE NÚMERO A LETRAS EN ESPAÑOL
    // ═══════════════════════════════════════════
    function numeroALetras(n) {
        if (n === 0) return "cero";
        if (n < 0) return "menos " + numeroALetras(-n);

        const u = ["","un","dos","tres","cuatro","cinco","seis","siete","ocho","nueve"];
        const esp = ["diez","once","doce","trece","catorce","quince","dieciséis","diecisiete","dieciocho","diecinueve"];
        const dec = ["","diez","veinte","treinta","cuarenta","cincuenta","sesenta","setenta","ochenta","noventa"];
        const cen = ["","ciento","doscientos","trescientos","cuatrocientos","quinientos","seiscientos","setecientos","ochocientos","novecientos"];

        let r = "";

        if (n >= 1000000) {
            let m = Math.floor(n / 1000000);
            r += (m === 1 ? "un millón " : numeroALetras(m) + " millones ");
            n %= 1000000;
        }
        if (n >= 1000) {
            let k = Math.floor(n / 1000);
            r += (k === 1 ? "mil " : numeroALetras(k) + " mil ");
            n %= 1000;
        }
        if (n >= 100) {
            if (n === 100) { r += "cien"; n = 0; }
            else { r += cen[Math.floor(n / 100)] + " "; n %= 100; }
        }
        if (n >= 20) {
            if (n >= 21 && n <= 29) {
                r += "veinti" + u[n - 20]; n = 0;
            } else {
                r += dec[Math.floor(n / 10)];
                if (n % 10 > 0) r += " y " + u[n % 10];
                n = 0;
            }
        } else if (n >= 10) {
            r += esp[n - 10]; n = 0;
        } else if (n > 0) {
            r += u[n];
        }

        return r.trim();
    }

    function actualizarLetras() {
        const val = parseInt(document.getElementById('costo_mensual').value) || 0;
        const display = document.getElementById('valorEnLetras');
        if (val > 0) {
            display.textContent = '💬 "' + numeroALetras(val) + ' pesos"';
        } else {
            display.textContent = '';
        }
    }

    // Vista previa foto
    document.getElementById('foto_paciente').onchange = function(ev) {
        const p = document.getElementById('preview');
        if (ev.target.files.length > 0) { p.src = URL.createObjectURL(ev.target.files[0]); p.style.display = 'block'; }
        else { p.style.display = 'none'; }
    };

    // Botones de alerta
    document.querySelectorAll('.alerta-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.alerta-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            alertaSeleccionada = btn.dataset.val;
        };
    });

    // Comprimir imagen manteniendo proporciones
    function compressImage(file, maxW, quality) {
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = e => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const c = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > maxW) { h = (maxW / w) * h; w = maxW; }
                    c.width = w; c.height = h;
                    c.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(c.toDataURL('image/jpeg', quality));
                };
            };
        });
    }

    // Envío
    document.getElementById('registroForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('sendBtn');
        const status = document.getElementById('statusMsg');

        btn.innerText = "Procesando...";
        btn.classList.add('loading');
        status.style.display = "none";

        let fotoBase64 = "";
        const fi = document.getElementById('foto_paciente');
        if (fi.files.length > 0) {
            try { fotoBase64 = await compressImage(fi.files[0], 600, 0.5); } catch(err) {}
        }

        const costoNum = parseInt(document.getElementById('costo_mensual').value) || 0;

        const payload = {
            fecha_registro:          new Date().toISOString().split('T')[0],
            foto_paciente:           fotoBase64,
            nombre_paciente:         document.getElementById('nombre').value.trim().toUpperCase(),
            documento:               document.getElementById('cedula').value.trim(),
            edad:                    document.getElementById('edad').value || "",
            fecha_ingreso:           document.getElementById('fecha_ingreso').value,
            costo_mensual:           costoNum,
            costo_en_letras:         costoNum > 0 ? numeroALetras(costoNum) + " pesos" : "",
            mes_pago:                document.getElementById('mes_pago').value,
            nombre_acudiente:        document.getElementById('nombre_acudiente').value.trim().toUpperCase(),
            telefono_acudiente:      document.getElementById('telefono_acudiente').value.trim(),
            parentesco:              document.getElementById('parentesco').value.trim().toUpperCase(),
            medicamentos:            document.getElementById('medicamentos').value.trim().toUpperCase(),
            tomas_psilocibina:       document.getElementById('psilocibina').value || "",
            sueros_desintoxicacion:  document.getElementById('sueros').value || "",
            citas_medicas:           document.getElementById('citas_medicas').value.trim().toUpperCase(),
            citas_odontologia:       document.getElementById('citas_odontologia').value.trim().toUpperCase(),
            citas_psicologia:        document.getElementById('citas_psicologia').value.trim().toUpperCase(),
            consejeria_terapeutica:  document.getElementById('consejeria').value.trim().toUpperCase(),
            citas_psiquiatria:       document.getElementById('citas_psiquiatria').value.trim().toUpperCase(),
            terapia_familia:         document.getElementById('terapia_familia').value.trim().toUpperCase(),
            observaciones:           document.getElementById('observaciones').value.trim(),
            nivel_alerta:            alertaSeleccionada
        };

        try {
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            });

            status.innerText = "✅ Ficha generada exitosamente.";
            status.className = "status success";
            document.getElementById('registroForm').reset();
            document.getElementById('preview').style.display = 'none';
            document.getElementById('valorEnLetras').textContent = '';
            document.querySelectorAll('.alerta-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.alerta-btn[data-val="Normal"]').classList.add('active');
            alertaSeleccionada = "Normal";
        } catch (err) {
            status.innerText = "❌ Error de conexión.";
            status.className = "status error";
        } finally {
            btn.innerText = "ENVIAR Y GENERAR FICHA";
            btn.classList.remove('loading');
        }
    };
</script>
</body>
</html>
